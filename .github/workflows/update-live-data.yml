name: Update live IPL data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run the normal data refresh or a no-write scorecard API diagnostic
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - diagnose-scorecard
      match_id:
        description: CricketData match id to diagnose
        required: false
        default: e4f4995f-036e-451d-861e-42567c82d87f
      expected_player:
        description: Batter to verify in the fresh scorecard
        required: false
        default: Abhishek Sharma
      expected_runs:
        description: Expected runs for that batter
        required: false
        default: '135'
      expected_innings:
        description: Minimum scorecard innings expected
        required: false
        default: '2'
      force_refetch_scorecard_ids:
        description: Comma-separated CricketData match ids to refetch even when cached
        required: false
        default: ''
  schedule:
    - cron: '0 9,13,14,15,18,19 28-31 3 *'
    - cron: '0 9,13,14,15,18,19 * 4 *'
    - cron: '0 9,13,14,15,18,19 1-24 5 *'

permissions:
  contents: read

concurrency:
  group: update-live-data
  cancel-in-progress: false

jobs:
  diagnose-scorecard:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'diagnose-scorecard'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Diagnose CricketData scorecard
        env:
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
          CRICKETDATA_API_KEY_FALLBACK: ${{ secrets.CRICKETDATA_API_KEY_FALLBACK }}
          DIAGNOSTIC_SCORECARD_MATCH_ID: ${{ inputs.match_id }}
          DIAGNOSTIC_SCORECARD_EXPECTED_PLAYER: ${{ inputs.expected_player }}
          DIAGNOSTIC_SCORECARD_EXPECTED_RUNS: ${{ inputs.expected_runs }}
          DIAGNOSTIC_SCORECARD_EXPECTED_INNINGS: ${{ inputs.expected_innings }}
        run: node scripts/diagnose-scorecard-api.mjs

  update-live-data:
    if: github.event_name != 'workflow_dispatch' || inputs.mode == 'refresh'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.LIVE_DATA_PUSH_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CricketData worker
        env:
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
          CRICKETDATA_API_KEY_FALLBACK: ${{ secrets.CRICKETDATA_API_KEY_FALLBACK }}
          CRICKETDATA_FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          CRICKETDATA_MAX_BACKLOG_SCORECARDS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && '12' || '2' }}
          CRICKETDATA_MAX_FRESH_SCORECARD_CALLS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && '12' || '1' }}
          CRICKETDATA_ALLOW_HISTORICAL_REPLAY: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          CRICKETDATA_FORCE_REFETCH_SCORECARD_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refetch_scorecard_ids || '' }}
        run: node scripts/update-live-data.mjs

      - name: Validate live data contract
        run: node scripts/validate-live-data.mjs data/live.json

      - name: Refresh Mini Fantasy prices
        run: node scripts/update-mini-fantasy-prices.mjs

      - name: Publish Mini Fantasy leaderboard snapshot
        if: github.ref_name == 'main'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/publish-mini-fantasy-leaderboard.mjs

      - name: Commit live data
        shell: bash
        run: |
          git config user.name "sp-cup-bot"
          git config user.email "sp-cup-bot@users.noreply.github.com"
          git add data/live.json
          git add data/mini_fantasy_prices.json
          if [ -d data/scorecards ]; then
            git add data/scorecards
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh live IPL data"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
