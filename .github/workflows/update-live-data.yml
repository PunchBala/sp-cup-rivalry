name: Update live IPL data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  update-live-data:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CricketData worker
        env:
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
        run: node scripts/update-live-data.mjs

      - name: Validate live data contract
        run: node scripts/validate-live-data.mjs data/live.json

      - name: Commit live data
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          $changes = git diff --staged --name-only
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host "No changes to commit"
          } else {
            git commit -m "chore: refresh live IPL data"
            git push
          }
