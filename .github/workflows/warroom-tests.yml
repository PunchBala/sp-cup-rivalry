name: War Room tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  engine-contract-and-league-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run engine, live-data contract, and league-model tests
        run: node --test tests/warroom-engine.golden.test.mjs tests/warroom-engine.fixtures.test.mjs tests/live-data.contract.test.mjs tests/league-model.test.mjs

      - name: Validate current live.json contract directly
        run: node scripts/validate-live-data.mjs data/live.json

      - name: Validate shipped league fixtures directly
        run: node scripts/validate-league-config.mjs fixtures/league_sp_cup_2026.json fixtures/league_draft_example.json

  page-smoke:
    runs-on: ubuntu-latest
    needs: engine-contract-and-league-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke test against local site
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/warroom-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx playwright test tests/page.smoke.spec.mjs --reporter=line
