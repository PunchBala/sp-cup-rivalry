name: War Room tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  engine-and-model-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run engine, contract, schedule, and room-model tests
        run: |
          node --test             tests/warroom-engine.golden.test.mjs             tests/warroom-engine.fixtures.test.mjs             tests/live-data.contract.test.mjs             tests/warroom-room-model.test.mjs             tests/update-live-data.quota.test.mjs             tests/update-live-data.schedule.test.mjs

      - name: Validate live-data and war-room fixtures
        run: |
          node scripts/validate-live-data.mjs data/live.json
          node scripts/validate-war-room-config.mjs fixtures/war_room_sp_cup_2026.json fixtures/war_room_draft_example.json

  page-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke test against local site
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/warroom-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx playwright test tests/page.smoke.spec.mjs --reporter=line
